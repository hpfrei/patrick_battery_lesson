<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Battery Browser</title>
<!-- Pico CSS: zero-config styling for plain HTML -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
  main { padding: 1rem; max-width: 1200px; }
  .filters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
  @media (max-width: 800px) { .filters { grid-template-columns: 1fr 1fr; } }
  select[multiple] { min-height: 7rem; }
  table { font-size: .85rem; }
  td button { padding: .1rem .4rem; font-size: .8rem; }
</style>
</head>
<body>
<main>
  <h1>🔋 Battery Browser</h1>

  <article>
    <div class="filters">
      <label>Chemistry      <select id="f-chemistry"   multiple></select></label>
      <label>Form factor    <select id="f-form_factor" multiple></select></label>
      <label>Manufacturer   <select id="f-manufacturer" multiple></select></label>
      <label>Min mAh        <input  id="f-min_capacity" type="number" min="0"></label>
    </div>
    <div role="group">
      <button onclick="search()">Search</button>
      <button class="secondary" onclick="reset()">Show all</button>
      <button class="contrast"  onclick="showStats()">Stats</button>
    </div>
    <small id="status"></small>
  </article>

  <article><figure><table id="grid"></table></figure></article>

  <article>
    <h3>Add a battery</h3>
    <div class="filters">
      <label>Name *          <input id="a-name"></label>
      <label>Manufacturer    <input id="a-manufacturer"></label>
      <label>Chemistry *     <input id="a-chemistry"></label>
      <label>Form factor     <input id="a-form_factor"></label>
      <label>Capacity (mAh)  <input id="a-capacity_mah"    type="number"></label>
      <label>Voltage (V)     <input id="a-voltage_v"       type="number" step="0.01"></label>
      <label>Weight (g)      <input id="a-weight_g"        type="number" step="0.1"></label>
      <label>Year            <input id="a-year_introduced" type="number"></label>
    </div>
    <label><input id="a-rechargeable" type="checkbox"> Rechargeable</label>
    <label>Notes <input id="a-notes"></label>
    <button onclick="add()">Add</button>
  </article>

  <!-- Stats: native modal, no library needed -->
  <dialog id="stats-dlg">
    <article>
      <header><strong>Stats by chemistry</strong></header>
      <table id="stats-grid"></table>
      <footer><form method="dialog"><button>Close</button></form></footer>
    </article>
  </dialog>
</main>

<script>
// Columns the API returns; drives table headers and the add form
const COLS    = ["id","name","manufacturer","chemistry","form_factor",
                 "capacity_mah","voltage_v","weight_g","rechargeable","year_introduced","notes"];
const FILTERS = ["chemistry","form_factor","manufacturer"];

const $   = id => document.getElementById(id);
const api = (path, opts) => fetch(path, opts).then(r => r.json());

// Cached "all rows" — used to populate the filter dropdowns
let allRows = [];

// Sorted unique values for one column
const distinct = f => [...new Set(allRows.map(r => r[f]).filter(Boolean))].sort();
// Selected option values from a <select multiple>
const picked   = id => [...$(id).selectedOptions].map(o => o.value);

// Fetch all rows, fill dropdowns, render table
async function loadAll() {
  ({rows: allRows} = await api("/api/batteries"));
  for (const f of FILTERS)
    $("f-"+f).innerHTML = distinct(f).map(v => `<option>${v}</option>`).join("");
  render(allRows);
}

// Build ?chemistry=X&chemistry=Y&... and ask server to filter
async function search() {
  const p = new URLSearchParams();
  for (const f of FILTERS) picked("f-"+f).forEach(v => p.append(f, v));
  if ($("f-min_capacity").value) p.set("min_capacity", $("f-min_capacity").value);
  const qs = p.toString();
  const {rows} = await api("/api/batteries" + (qs ? "?"+qs : ""));
  render(rows);
}

function reset() {
  for (const f of FILTERS) [...$("f-"+f).options].forEach(o => o.selected = false);
  $("f-min_capacity").value = "";
  render(allRows);
}

function render(rows) {
  $("grid").innerHTML =
    "<thead><tr>" + COLS.map(c => `<th>${c}</th>`).join("") + "<th></th></tr></thead>" +
    "<tbody>" + rows.map(r =>
      "<tr>" + COLS.map(c => {
        let v = r[c];
        if (c === "rechargeable") v = v ? "yes" : "no";
        return `<td>${v ?? ""}</td>`;
      }).join("") +
      `<td><button class="secondary outline" onclick="del(${r.id})">×</button></td></tr>`
    ).join("") + "</tbody>";
  $("status").textContent = rows.length + " rows";
}

async function del(id) {
  if (!confirm("Delete id " + id + "?")) return;
  await api("/api/batteries/"+id, {method:"DELETE"});
  loadAll();
}

async function add() {
  const num = id => { const v = $(id).value.trim(); return v === "" ? null : +v; };
  const str = id => $(id).value.trim() || null;
  const data = {
    name: str("a-name"), manufacturer: str("a-manufacturer"),
    chemistry: str("a-chemistry"), form_factor: str("a-form_factor"),
    capacity_mah: num("a-capacity_mah"), voltage_v: num("a-voltage_v"),
    weight_g: num("a-weight_g"), year_introduced: num("a-year_introduced"),
    notes: str("a-notes"), rechargeable: $("a-rechargeable").checked,
  };
  if (!data.name || !data.chemistry) { $("status").textContent = "name and chemistry required"; return; }
  await api("/api/batteries", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data),
  });
  document.querySelectorAll('input[id^="a-"]').forEach(el => {
    if (el.type === "checkbox") el.checked = false; else el.value = "";
  });
  loadAll();
}

// Stats opens in the dialog so it's impossible to miss
async function showStats() {
  const {rows} = await api("/api/stats");
  $("stats-grid").innerHTML =
    "<thead><tr><th>Chemistry</th><th>n</th><th>avg mAh</th><th>avg V</th></tr></thead>" +
    "<tbody>" + rows.map(r =>
      `<tr><td>${r.chemistry}</td><td>${r.count}</td><td>${r.avg_capacity_mah ?? ""}</td><td>${r.avg_voltage_v ?? ""}</td></tr>`
    ).join("") + "</tbody>";
  $("stats-dlg").showModal();
}

loadAll();
</script>
</body>
</html>
